<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader — без вотермарки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0d;
    --card:rgba(24,24,30,.6);
    --accent:#25f4ee;
    --accent2:#fe2c55;
    --text:#f5f5f7;
    --muted:#9a9aa4;
    --border:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Manrope',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:.35;
    z-index:0;
    pointer-events:none;
  }
  .blob1{
    width:420px;height:420px;
    background:var(--accent);
    top:-120px; left:-100px;
    animation:float1 12s ease-in-out infinite;
  }
  .blob2{
    width:380px;height:380px;
    background:var(--accent2);
    bottom:-140px; right:-100px;
    animation:float2 14s ease-in-out infinite;
  }
  @keyframes float1{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(40px,30px);}
  }
  @keyframes float2{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(-30px,-40px);}
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:520px;
  }

  .card{
    background:var(--card);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-radius:24px;
    padding:40px 36px;
    border:1px solid var(--border);
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }

  .logo-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:22px;
  }
  .logo-img{
    width:52px;
    height:52px;
    border-radius:14px;
    object-fit:cover;
    box-shadow:0 8px 24px rgba(254,44,85,.35), 0 0 0 1px var(--border);
    background:#000;
  }
  .brand h1{
    font-size:21px;
    margin:0;
    font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:.2px;
  }
  .brand span{
    display:block;
    font-size:12px;
    color:var(--muted);
    font-weight:600;
    letter-spacing:.5px;
    margin-top:2px;
  }

  p.sub{
    color:var(--muted);
    margin:0 0 28px;
    font-size:14.5px;
    line-height:1.5;
  }

  form{
    display:flex;
    gap:10px;
    margin-bottom:20px;
  }
  input[type="text"]{
    flex:1;
    padding:15px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
    color:var(--text);
    font-size:14px;
    outline:none;
    font-family:inherit;
    transition:border-color .2s, background .2s;
  }
  input[type="text"]::placeholder{color:#6a6a72;}
  input[type="text"]:focus{
    border-color:var(--accent);
    background:rgba(37,244,238,.05);
  }
  button{
    padding:15px 22px;
    border-radius:14px;
    border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0a0a0d;
    font-weight:800;
    cursor:pointer;
    font-size:14px;
    white-space:nowrap;
    font-family:inherit;
    transition:transform .15s, box-shadow .15s;
    box-shadow:0 6px 20px rgba(254,44,85,.25);
  }
  button:hover:not(:disabled){
    transform:translateY(-1px);
    box-shadow:0 10px 26px rgba(254,44,85,.35);
  }
  button:active:not(:disabled){transform:translateY(0);}
  button:disabled{
    opacity:.55;
    cursor:default;
    box-shadow:none;
  }

  .status{
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .spinner{
    width:13px;height:13px;
    border-radius:50%;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    animation:spin .7s linear infinite;
    display:none;
  }
  .spinner.show{display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .result{
    display:none;
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:18px;
    border:1px solid var(--border);
    margin-top:6px;
    animation:fadeUp .35s ease;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  .result.show{display:block;}
  .result video{
    width:100%;
    max-height:420px;
    border-radius:12px;
    margin-bottom:14px;
    background:#000;
    display:block;
  }
  .meta{
    font-size:13.5px;
    color:var(--muted);
    margin-bottom:16px;
    line-height:1.5;
  }
  .meta b{color:var(--text); font-size:14.5px;}
  .dl-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    text-align:center;
    padding:15px;
    border-radius:14px;
    text-decoration:none;
    background:linear-gradient(90deg,var(--accent2),#ff6b9d);
    color:#fff;
    font-weight:800;
    font-size:14px;
    box-shadow:0 8px 22px rgba(254,44,85,.3);
    transition:transform .15s;
  }
  .dl-btn:hover{transform:translateY(-1px);}

  .error{
    color:var(--accent2);
    font-size:13px;
    margin-top:6px;
    margin-bottom:8px;
    display:none;
    background:rgba(254,44,85,.08);
    border:1px solid rgba(254,44,85,.25);
    padding:10px 12px;
    border-radius:10px;
  }
  .error.show{display:block;}

  footer{
    margin-top:26px;
    font-size:11.5px;
    color:#5f5f68;
    text-align:center;
    line-height:1.5;
  }

  @media (max-width:480px){
    .card{padding:28px 22px;}
    form{flex-direction:column;}
    button{width:100%;}
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrap">
  <div class="card">
    <div class="logo-row">
      <img class="logo-img" src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse4.mm.bing.net%2Fth%2Fid%2FOIP.l9gg7FWW_NOqMGE4b-_rzwHaHa%3Fr%3D0%26pid%3DApi&f=1&ipt=fb81c1061b95a4ae000262f5da0ef52ce2794f5990c649915a75652dd586928a&ipo=images" alt="Логотип">
      <div class="brand">
        <h1>TikTok Downloader</h1>
        <span>БЕЗ ВОТЕРМАРКИ</span>
      </div>
    </div>

    <p class="sub">Вставь ссылку на видео из TikTok — получишь чистый файл без вотермарки, в оригинальном качестве.</p>

    <form id="form">
      <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/..." required autocomplete="off">
      <button type="submit" id="submitBtn">Скачать</button>
    </form>

    <div class="status" id="status">
      <span class="spinner" id="spinner"></span>
      <span id="statusText"></span>
    </div>
    <div class="error" id="error"></div>

    <div class="result" id="result">
      <video id="preview" controls></video>
      <div class="meta" id="meta"></div>
      <a href="#" class="dl-btn" id="dlLink" download target="_blank">⬇ Скачать видео без вотермарки</a>
    </div>

    <footer>Используется публичный сервис-посредник для получения прямой ссылки.<br>Скачивай только контент, на который у тебя есть права.</footer>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
