<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader — без вотермарки</title>
<style>
  :root{
    --bg:#0f0f12;
    --card:#18181c;
    --accent:#25f4ee;
    --accent2:#fe2c55;
    --text:#f2f2f2;
    --muted:#9a9aa2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:radial-gradient(circle at top, #1a1a20, #0f0f12 60%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--card);
    border-radius:20px;
    padding:32px;
    width:100%;
    max-width:480px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    border:1px solid #2a2a30;
  }
  h1{
    font-size:22px;
    margin:0 0 4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:800;
  }
  p.sub{
    color:var(--muted);
    margin:0 0 24px;
    font-size:14px;
  }
  form{
    display:flex;
    gap:8px;
    margin-bottom:20px;
  }
  input[type="text"]{
    flex:1;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid #33333a;
    background:#0f0f12;
    color:var(--text);
    font-size:14px;
    outline:none;
  }
  input[type="text"]:focus{
    border-color:var(--accent);
  }
  button{
    padding:14px 20px;
    border-radius:12px;
    border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0f0f12;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    white-space:nowrap;
  }
  button:disabled{
    opacity:.6;
    cursor:default;
  }
  .status{
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    margin-bottom:12px;
  }
  .result{
    display:none;
    background:#0f0f12;
    border-radius:14px;
    padding:16px;
    border:1px solid #2a2a30;
  }
  .result.show{display:block;}
  .result video{
    width:100%;
    border-radius:10px;
    margin-bottom:12px;
    background:#000;
  }
  .meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:14px;
    line-height:1.4;
  }
  .meta b{color:var(--text);}
  .dl-btn{
    display:block;
    width:100%;
    text-align:center;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    background:var(--accent2);
    color:#fff;
    font-weight:700;
    font-size:14px;
  }
  .error{
    color:var(--accent2);
    font-size:13px;
    margin-top:8px;
    display:none;
  }
  .error.show{display:block;}
  footer{
    margin-top:20px;
    font-size:12px;
    color:var(--muted);
    text-align:center;
  }
</style>
</head>
<body>

<div class="card">
  <h1>TikTok Downloader</h1>
  <p class="sub">Вставь ссылку на видео из TikTok — получишь файл без вотермарки.</p>

  <form id="form">
    <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/..." required>
    <button type="submit" id="submitBtn">Скачать</button>
  </form>

  <div class="status" id="status"></div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <video id="preview" controls></video>
    <div class="meta" id="meta"></div>
    <a href="#" class="dl-btn" id="dlLink" download target="_blank">Скачать видео (без вотермарки)</a>
  </div>

  <footer>Используется публичный сервис-посредник для получения прямой ссылки. Скачивайте только контент, на который у вас есть права.</footer>
</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
